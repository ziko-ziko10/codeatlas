<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="compassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="needleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Outer compass ring with gaps -->
  <circle cx="100" cy="100" r="75" stroke="url(#compassGrad)" stroke-width="6" fill="none" stroke-dasharray="118 30 118 30" stroke-dashoffset="0"/>
  
  <!-- Compass points -->
  <polygon points="100,15 105,35 95,35" fill="url(#compassGrad)"/>
  <polygon points="100,185 105,165 95,165" fill="url(#compassGrad)"/>
  <polygon points="15,100 35,95 35,105" fill="url(#compassGrad)"/>
  <polygon points="185,100 165,95 165,105" fill="url(#compassGrad)"/>
  
  <!-- Circuit traces left side -->
  <circle cx="60" cy="60" r="4" fill="url(#compassGrad)"/>
  <line x1="60" y1="60" x2="75" y2="75" stroke="url(#compassGrad)" stroke-width="2"/>
  <circle cx="75" cy="75" r="3" fill="url(#compassGrad)"/>
  
  <circle cx="55" cy="85" r="4" fill="url(#compassGrad)"/>
  <line x1="55" y1="85" x2="70" y2="85" stroke="url(#compassGrad)" stroke-width="2"/>
  
  <circle cx="60" cy="110" r="4" fill="url(#compassGrad)"/>
  <line x1="60" y1="110" x2="75" y2="110" stroke="url(#compassGrad)" stroke-width="2"/>
  <circle cx="75" cy="110" r="3" fill="url(#compassGrad)"/>
  
  <!-- Code lines right side -->
  <line x1="120" y1="55" x2="145" y2="55" stroke="url(#compassGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="125" y1="65" x2="140" y2="65" stroke="url(#compassGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="130" y1="75" x2="150" y2="75" stroke="url(#compassGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="120" y1="85" x2="135" y2="85" stroke="url(#compassGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="125" y1="95" x2="145" y2="95" stroke="url(#compassGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="130" y1="105" x2="150" y2="105" stroke="url(#compassGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="120" y1="115" x2="140" y2="115" stroke="url(#compassGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="125" y1="125" x2="145" y2="125" stroke="url(#compassGrad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Compass needle -->
  <polygon points="100,40 130,100 100,115 70,100" fill="url(#needleGrad)"/>
  <circle cx="100" cy="100" r="8" fill="#0a0a1a"/>
  <circle cx="100" cy="100" r="4" fill="url(#compassGrad)"/>
  
  <!-- L brackets -->
  <path d="M85 50 L85 65 L100 65" stroke="url(#compassGrad)" stroke-width="2" fill="none"/>
  <path d="M115 135 L115 150 L100 150" stroke="url(#compassGrad)" stroke-width="2" fill="none"/>
</svg>
